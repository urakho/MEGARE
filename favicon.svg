<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#1a1a2e"/>
  
  <!-- Tank body -->
  <rect x="12" y="30" width="40" height="18" rx="4" fill="#27ae60"/>
  
  <!-- Tank turret -->
  <rect x="20" y="22" width="24" height="12" rx="3" fill="#2ecc71"/>
  
  <!-- Tank barrel -->
  <rect x="38" y="25" width="16" height="5" rx="2" fill="#f1c40f"/>
  
  <!-- Wheels -->
  <circle cx="18" cy="48" r="5" fill="#1a8a4a"/>
  <circle cx="32" cy="50" r="5" fill="#1a8a4a"/>
  <circle cx="46" cy="48" r="5" fill="#1a8a4a"/>
  
  <!-- Track line -->
  <rect x="12" y="46" width="40" height="4" rx="2" fill="#145a32"/>
  
  <!-- Star highlight -->
  <circle cx="50" cy="14" r="5" fill="#f1c40f" opacity="0.9"/>
  <text x="50" y="18" text-anchor="middle" font-size="7" fill="#1a1a2e" font-weight="bold">M</text>
</svg>
